<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Nexuslogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nexus Impacts AI</title>
    <meta name="description" content="Expert-level system for charities to track, categorize, and showcase their impact">

    <!-- PWA iOS meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nexus Impacts" />
    <meta name="theme-color" content="#c0dfa1" />
    <link rel="apple-touch-icon" href="/Nexuslogo.png" />

    <!-- Conditional manifest + install prompt capture (mobile only) -->
    <script>
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        var l = document.createElement('link');
        l.rel = 'manifest';
        l.href = '/manifest.json';
        document.head.appendChild(l);
      }
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredInstallPrompt = e;
      });
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
